name: Deploy to Orange Host

on:
  push:
    branches:
      - main   # change if using another branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Relative to the FTP user home (typical cPanel). Avoid a leading "/" — that can
          # resolve to the server root instead of your account's public_html.
          server-dir: public_html/
          # If uploads fail with TLS errors, try uncommenting one of these (host-dependent):
          # protocol: ftps
          # protocol: ftps-legacy