name: Deploy to Orange Host

on:
  push:
    branches:
      - main   # change if using another branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # FTP-Deploy-Action requires server, username, password. If any are missing you get:
      # "Input required and not supplied: server" — add these under:
      # GitHub → repo → Settings → Secrets and variables → Actions → New repository secret
      - name: Verify FTP secrets exist
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=0
          if [ -z "$FTP_SERVER" ]; then echo "::error::Secret FTP_SERVER is missing or empty (hostname, e.g. ftp.yourdomain.com or server IP from cPanel)."; missing=1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "::error::Secret FTP_USERNAME is missing or empty."; missing=1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "::error::Secret FTP_PASSWORD is missing or empty."; missing=1; fi
          exit $missing

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # server-dir is relative to where FTP *first* lands after login (not the Linux path in cPanel).
          # - If your FTP user opens INSIDE the site folder already (common for addon domains): use "./"
          #   Otherwise you get a nested folder like pdaafrica.org/pdaafrica.org/
          # - If FTP opens at account home and the site lives in a subfolder: set repo variable
          #   ORANGE_FTP_SERVER_DIR to that folder name with trailing slash, e.g. "pdaafrica.org/"
          # Do NOT use absolute paths like /home/username — the action expects FTP-relative paths.
          # Never use Linux paths like /home/username here — only FTP-relative paths.
          # Default "./" = folder you see right after FTP login. If login is /home/user, set
          # repo variable ORANGE_FTP_SERVER_DIR to pdaafrica.org/
          server-dir: ${{ vars.ORANGE_FTP_SERVER_DIR != '' && vars.ORANGE_FTP_SERVER_DIR || './' }}
          # Most shared hosts require explicit FTPS on port 21. If you see TLS errors, try
          # protocol: ftps-legacy instead, or remove protocol for plain FTP (rare).
          protocol: ftps
          security: loose
          timeout: 120000